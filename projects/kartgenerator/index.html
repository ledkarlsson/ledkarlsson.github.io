<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kartgenerator | Daniel Karlsson's Toolbox</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f3ee;
      --panel: #ffffff;
      --ink: #172026;
      --muted: #66717a;
      --line: #d9d2c7;
      --accent: #237a78;
      --accent-strong: #175a58;
      --warm: #d87c35;
      --shadow: 0 18px 45px rgba(23, 32, 38, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(135deg, rgba(35, 122, 120, 0.12), transparent 34%),
        linear-gradient(315deg, rgba(216, 124, 53, 0.12), transparent 30%),
        var(--bg);
      color: var(--ink);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 12px 0 48px;
      color: var(--muted);
    }

    .topbar a:hover {
      color: var(--accent-strong);
    }

    .brand {
      color: var(--ink);
      font-weight: 700;
    }

    .project {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(280px, 0.95fr);
      gap: 36px;
      align-items: stretch;
    }

    .intro,
    .workspace {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .intro {
      padding: 36px;
    }

    .meta {
      display: inline-block;
      margin-bottom: 24px;
      color: var(--accent-strong);
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.5rem, 8vw, 5rem);
      line-height: 0.98;
      letter-spacing: 0;
    }

    p {
      max-width: 650px;
      margin: 24px 0 0;
      color: var(--muted);
      font-size: 1.12rem;
      line-height: 1.65;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 32px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border: 1px solid var(--accent);
      border-radius: 8px;
      background: var(--accent);
      color: #ffffff;
      cursor: pointer;
      font-weight: 700;
    }

    .button.secondary {
      background: transparent;
      color: var(--accent-strong);
    }

    .file-input {
      position: absolute;
      inline-size: 1px;
      block-size: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .workspace {
      min-height: 360px;
      padding: 22px;
      background:
        linear-gradient(90deg, rgba(23, 32, 38, 0.06) 1px, transparent 1px),
        linear-gradient(rgba(23, 32, 38, 0.06) 1px, transparent 1px),
        #fffaf3;
      background-size: 28px 28px;
      position: relative;
      overflow: hidden;
    }

    .map-shape {
      position: absolute;
      border: 3px solid var(--accent);
      border-radius: 999px;
    }

    .shape-one {
      width: 180px;
      height: 180px;
      left: 40px;
      top: 42px;
    }

    .shape-two {
      width: 220px;
      height: 118px;
      right: 34px;
      bottom: 50px;
      border-color: var(--warm);
      transform: rotate(-16deg);
    }

    .pin {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent-strong);
      box-shadow: 0 0 0 8px rgba(35, 122, 120, 0.18);
      left: 54%;
      top: 42%;
    }

    .panel {
      position: relative;
      width: min(240px, 100%);
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 1rem;
    }

    .panel ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.7;
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 24px, 1120px);
        padding-top: 20px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
        padding-bottom: 36px;
      }

      .project {
        grid-template-columns: 1fr;
      }

      .intro {
        padding: 26px;
      }

      .workspace {
        min-height: 280px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <nav class="topbar" aria-label="Project navigation">
      <a class="brand" href="../../index.html">Daniel Karlsson</a>
      <a href="../../index.html">Back to toolbox</a>
    </nav>

    <section class="project" aria-labelledby="project-title">
      <div class="intro">
        <span class="meta">Project page</span>
        <h1 id="project-title">kartgenerator</h1>
        <p>
          En kartgenerator som kan generera kartor fran Excel-data relevant for batklubbar.
        </p>
        <div class="actions" aria-label="Project actions">
          <label class="button" for="excel-upload">Upload Excel file</label>
          <input class="file-input" id="excel-upload" type="file" accept=".xlsx,.xls" />
          <a class="button secondary" href="../../index.html">Back to toolbox</a>
        </div>
      </div>

      <div class="workspace" aria-label="Kartgenerator workspace preview">
        <div class="panel">
          <h2>Kartlager</h2>
          <ul>
            <li>Hamnomrade</li>
            <li>Bryggor</li>
            <li>Batplatser</li>
          </ul>
        </div>
        <span class="map-shape shape-one" aria-hidden="true"></span>
        <span class="map-shape shape-two" aria-hidden="true"></span>
        <span class="pin" aria-hidden="true"></span>
      </div>
    </section>
  </main>
</body>
</html>
